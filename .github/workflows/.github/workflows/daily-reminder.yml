name: Daily Sports Reminder

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC = 09:00 Israel קיץ (IDT) / 08:00 Israel חורף (IST)
  workflow_dispatch:       # הרצה ידנית מ-GitHub בלחיצת כפתור

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send daily reminder
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 sports_reminder.py --send
