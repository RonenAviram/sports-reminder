name: Morning Games Reminder

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 Israel time
  workflow_dispatch:
    inputs:
      simulate_date:
        description: 'Simulate date (YYYY-MM-DD), leave empty for today'
        required: false
        default: ''
      full_tournament:
        description: 'Send full World Cup tournament schedule (true/false)'
        required: false
        default: 'false'

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send morning games email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.full_tournament }}" = "true" ]; then
            python3 sports_reminder.py --send --full-tournament
          elif [ -n "${{ github.event.inputs.simulate_date }}" ]; then
            python3 sports_reminder.py --send --no-stats --simulate-date "${{ github.event.inputs.simulate_date }}"
          else
            python3 sports_reminder.py --send --no-stats
          fi
