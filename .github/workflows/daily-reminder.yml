name: Daily Sports Reminder

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 Israel — morning games email
    - cron: '0 4 * * *'   # 07:00 Israel — post-game player stats
    - cron: '0 17 * * 6'  # 20:00 Israel Saturday — weekly digest
  workflow_dispatch:
    inputs:
      flow:
        description: 'Which flow to run: morning | stats | weekly | both'
        required: false
        default: 'both'

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Morning games reminder
        if: >
          github.event.schedule == '0 6 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.flow == 'morning' || github.event.inputs.flow == 'both'))
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 sports_reminder.py --send --no-stats

      - name: Post-game player stats
        if: >
          github.event.schedule == '0 4 * * *' ||
          (github.event_name == 'workflow_dispatch' &&
           (github.event.inputs.flow == 'stats' || github.event.inputs.flow == 'both'))
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 sports_reminder.py --send --stats-only

      - name: Weekly digest
        if: >
          github.event.schedule == '0 17 * * 6' ||
          (github.event_name == 'workflow_dispatch' &&
           github.event.inputs.flow == 'weekly')
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 sports_reminder.py --send --weekly
