name: Daily Sports Reminder

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 Israel — morning games email
    - cron: '0 4 * * *'   # 07:00 Israel — post-game player stats
  workflow_dispatch:       # manual trigger (runs morning flow)

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Morning games reminder
        if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 sports_reminder.py --send --no-stats

      - name: Post-game player stats
        if: github.event.schedule == '0 4 * * *'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 sports_reminder.py --send --stats-only
