name: Weekly Digest Reminder

on:
  schedule:
    - cron: '0 17 * * 6'  # 20:00 Israel time Saturday
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send weekly digest
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python3 sports_reminder.py --send --weekly
